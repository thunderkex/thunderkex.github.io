<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#212d33" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
<meta name="description" content="Configure and trigger ReVanced Extended builds from your GitHub repository.">
<title>RevPack Configurator</title>
<style>
  :root {
    --bg:          #0f0f0f;
    --surface:     #1a1a1a;
    --surface2:    #242424;
    --border:      #2e2e2e;
    --border-hover:#404040;
    --text:        #f0f0f0;
    --text2:       #a0a0a0;
    --accent:      #212d33;
    --green:       #4caf50;
    --yellow:      #ffb300;
    --red:         #e53935;
    --blue:        #42a5f5;
    --radius:      12px;
    --radius-sm:   6px;
    --shadow:      0 2px 12px rgba(0,0,0,.5);
    --shadow-lg:   0 8px 32px rgba(0,0,0,.7);
    --header-bg:   #212d33;
    --transition:  .15s ease;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:          #f5f5f5;
      --surface:     #ffffff;
      --surface2:    #f0f0f0;
      --border:      #e0e0e0;
      --border-hover:#b0b0b0;
      --text:        #1a1a1a;
      --text2:       #5a5a5a;
      --shadow:      0 2px 12px rgba(0,0,0,.12);
      --shadow-lg:   0 8px 32px rgba(0,0,0,.18);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  *:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 2px;
    border-radius: 3px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  .header {
    background: var(--header-bg);
    color: #fff;
    padding: 18px 20px 14px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
  .header p  { font-size: 12px; opacity: .75; margin-top: 2px; }
  .header .by {
    font-size: 11px; opacity: .55; margin-top: 4px;
    letter-spacing: .03em;
  }
  .header .by a {
    color: inherit; text-decoration: none; opacity: 1;
    border-bottom: 1px solid rgba(255,255,255,.3);
    transition: opacity .15s;
  }
  .header .by a:hover { opacity: .85; }

  .auth-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .auth-bar input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 7px 11px;
    min-height: 36px;
    outline: none;
    transition: border-color var(--transition);
  }
  .auth-bar input:focus,
  .auth-bar input:focus-visible { border-color: var(--blue); outline: none; }
  .auth-bar input[name="repo"]   { flex: 2 1 150px; min-width: 100px; }
  .auth-bar input[name="branch"] { flex: 0 0 80px; }
  .auth-bar input[name="token"]  { flex: 3 1 180px; min-width: 130px; }
  .btn {
    border: none; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; padding: 7px 16px;
    min-height: 36px;
    transition: opacity var(--transition), transform .08s;
  }
  .btn:active { transform: scale(.97); }
  .btn-load  { background: var(--blue);  color: #fff; }
  .btn-apply { background: var(--green); color: #fff; }
  .btn-apply:disabled { opacity: .4; cursor: not-allowed; }

  .main { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

  .banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .08em; color: var(--text2);
    margin: 24px 0 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .action-bar {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    margin-bottom: 16px;
  }
  .action-bar label { font-size: 12px; color: var(--text2); }
  .action-bar select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    padding: 6px 10px; outline: none;
  }
  .btn-sm {
    font-size: 12px; padding: 5px 12px; border-radius: 7px; border: none;
    cursor: pointer; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); font-weight: 600; min-height: 30px;
  }
  .btn-sm:hover { border-color: var(--blue); color: var(--blue); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .card:hover { border-color: var(--border-hover); box-shadow: var(--shadow); }
  .card.disabled-card { opacity: .55; }
  .card-header {
    display: flex; align-items: center; gap: 10px;
  }
  .app-icon {
    width: 36px; height: 36px; border-radius: 8px;
    object-fit: cover; flex-shrink: 0;
    background: var(--surface2);
  }
  .app-icon-fallback {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;
    text-transform: uppercase; letter-spacing: 0;
  }
  .card-name {
    font-weight: 700; font-size: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta { font-size: 11px; color: var(--text2); }

  .toggle-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; min-height: 36px; gap: 8px;
  }
  .toggle-label { color: var(--text2); }

  .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: var(--border); border-radius: 22px;
    cursor: pointer; transition: background .2s;
  }
  .slider::before {
    content: ''; position: absolute;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; left: 3px; top: 3px;
    transition: transform .2s;
  }
  .toggle input:checked + .slider { background: var(--green); }
  .toggle input:checked + .slider::before { transform: translateX(18px); }
  .pack-toggle input:checked + .slider { background: var(--blue); }

  .apply-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    padding-bottom: max(10px, calc(8px + env(safe-area-inset-bottom, 0px)));
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    justify-content: space-between;
    z-index: 10;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .apply-bar .info { font-size: 12px; color: var(--text2); }
  .apply-bar .info b { color: var(--text); }
  .apply-bar-right { display: flex; gap: 8px; align-items: center; }
  .apply-bar select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    padding: 6px 10px; outline: none;
  }

  .toast {
    position: fixed;
    bottom: 70px;
    bottom: max(70px, calc(56px + env(safe-area-inset-bottom, 0px)));
    left: 50%; transform: translateX(-50%);
    background: #323232; color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: 13px; z-index: 100; display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
    max-width: calc(100vw - 32px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .6s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    border-radius: 4px; padding: 1px 5px; margin-left: 4px;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .tag-dev { background: rgba(255,179,0,.15); color: var(--yellow); border: 1px solid rgba(255,179,0,.3); }
  .tag-mod { background: rgba(66,165,245,.12); color: var(--blue);   border: 1px solid rgba(66,165,245,.3); }

  /* ── Build Monitor Panel ── */
  .build-panel {
    position: fixed;
    right: 20px;
    bottom: 66px;
    width: 340px;
    max-height: 70vh;
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    z-index: 50;
    overscroll-behavior: contain;
  }
  .build-panel-head {
    background: var(--surface2);
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
  }
  .build-panel-head h3 { font-size: 13px; font-weight: 700; margin: 0; }
  .build-panel-close {
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 20px; line-height: 1; padding: 0 2px;
  }
  .build-panel-close:hover { color: var(--text); }
  .build-panel-body { padding: 14px; }
  .build-status-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .bp-icon { font-size: 22px; flex-shrink: 0; }
  .bp-text .bp-label { font-weight: 700; font-size: 13px; }
  .bp-text .bp-sub { color: var(--text2); font-size: 11px; margin-top: 2px; }
  .build-links { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .build-link {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; text-decoration: none;
    color: var(--text); font-size: 12px; transition: border-color .15s;
  }
  .build-link:hover { border-color: var(--blue); }
  .build-link .lk-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .build-link .lk-size { color: var(--text2); flex-shrink: 0; white-space: nowrap; }
  .build-progress {
    height: 3px; background: var(--border); border-radius: 2px;
    overflow: hidden; margin-top: 12px;
  }
  .build-progress-bar {
    height: 100%; background: var(--blue); border-radius: 2px;
    width: 30%; animation: bp-slide 1.5s ease-in-out infinite;
  }
  .build-panel.bp-success .build-progress-bar { background: var(--green); animation: none; width: 100%; }
  .build-panel.bp-failure .build-progress-bar,
  .build-panel.bp-cancelled .build-progress-bar { background: var(--red); animation: none; width: 100%; }
  .build-panel.bp-not-found .build-progress-bar { animation: none; width: 0; }
  @keyframes bp-slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(500%); }
  }

  /* ── Minimize button ── */
  .bp-minimize {
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 16px; line-height: 1;
    padding: 0 3px; margin-right: 2px;
  }
  .bp-minimize:hover { color: var(--text); }
  .bp-head-btns { display: flex; gap: 2px; align-items: center; }

  /* ── Actions History (in main) ── */
  .ht-entry {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
  }
  .ht-icon { font-size: 18px; flex-shrink: 0; }
  .ht-info { flex: 1; min-width: 0; }
  .ht-label { font-size: 13px; font-weight: 600; }
  .ht-sub { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ht-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text2);
    font-size: 12px; padding: 4px 10px; cursor: pointer;
    flex-shrink: 0; transition: border-color .12s, color .12s;
  }
  .ht-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* ── Steps log view ── */
  .bp-steps {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .bp-steps-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .bp-steps-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .08em; color: var(--text2);
  }
  .bp-job-name {
    font-size: 11px; font-weight: 700; color: var(--text);
    margin: 6px 0 3px; padding-left: 2px;
  }
  .bp-step {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; padding: 2px 0; color: var(--text2);
    padding-left: 8px;
  }
  .bp-step.step-active  { color: var(--blue); }
  .bp-step.step-fail    { color: var(--red); }
  .bp-step-icon  { width: 13px; text-align: center; flex-shrink: 0; font-style: normal; }
  .bp-step-name  { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bp-step-dur   { color: var(--text2); flex-shrink: 0; font-size: 10px; }

  /* ── pack-name-input (CSS, extracted from inline style) ── */
  #pack-name-input {
    width: 130px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 6px 10px;
    min-height: 36px;
    outline: none;
    transition: border-color var(--transition);
  }
  #pack-name-input:focus,
  #pack-name-input:focus-visible { border-color: var(--blue); outline: none; }

  /* ── Skip link (keyboard accessibility) ── */
  .skip-link {
    position: absolute; top: -100%; left: 8px;
    background: var(--blue); color: #fff;
    padding: 8px 16px; border-radius: 0 0 var(--radius) var(--radius);
    font-size: 13px; font-weight: 600; z-index: 200;
    text-decoration: none; white-space: nowrap;
    transition: top var(--transition);
  }
  .skip-link:focus { top: 0; }

  /* ── Responsive Breakpoints ── */
  @media (max-width: 580px) {
    .auth-bar { padding: 10px 12px; gap: 8px; }
    .auth-bar .btn-load { flex: 1; }
    .main { padding-left: 12px; padding-right: 12px; }
    .apply-bar {
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      padding: 8px 12px;
      padding-bottom: max(8px, calc(6px + env(safe-area-inset-bottom, 0px)));
    }
    .apply-bar .info { text-align: center; }
    .apply-bar-right { flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
    .btn-apply { flex: 1; }
    .build-panel {
      left: 8px; right: 8px; width: auto;
      bottom: max(66px, calc(60px + env(safe-area-inset-bottom, 0px)));
    }
    .grid { grid-template-columns: 1fr; gap: 10px; }
    .action-bar { gap: 6px; }
    #pack-name-input { flex: 1; width: auto; }
  }

  @media (max-width: 400px) {
    .header { padding: 14px 12px 12px; }
    .header h1 { font-size: 17px; }
  }

  @media (min-width: 1200px) {
    .main { max-width: 1100px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<header class="header">
  <h1>RevPack Configurator</h1>
  <p id="header-sub" aria-live="polite">Load config to get started</p>
  <p class="by">by <a href="https://github.com/thunderkex" target="_blank" rel="noopener">thunderkex</a></p>
</header>

<div class="auth-bar">
  <input name="repo"  placeholder="owner/repo" value="thunderkex/revanced-extended" />
  <input name="branch" placeholder="branch" value="ex" />
  <input name="token" type="password" placeholder="Github Token" />
  <button class="btn btn-load" onclick="loadConfig()">Load Config</button>
</div>

<main class="main" id="main-content">
  <div class="banner" id="status-banner" role="status" aria-live="polite" aria-atomic="true">
    Enter your repo details above and click <b>Load Config</b>.
  </div>

  <div id="app-area" style="display:none">
    <div class="action-bar">
      <button class="btn-sm" onclick="setAll(true,  'build')">Enable all builds</button>
      <button class="btn-sm" onclick="setAll(false, 'build')">Disable all builds</button>
      <button class="btn-sm" onclick="setAll(true,  'pack')">Pack all enabled</button>
      <button class="btn-sm" onclick="setAll(false, 'pack')">Clear pack list</button>
    </div>

    <div class="section-title">Apps</div>
    <div class="grid" id="app-grid"></div>

    <div class="section-title" id="dev-section-title" style="display:none">Dev / Experimental</div>
    <div class="grid" id="dev-grid"></div>
  </div>

  <div id="history-section" style="display:none">
    <div class="section-title" style="justify-content:space-between">
      <span>Actions History</span>
      <button class="btn-sm" onclick="loadRecentRuns()" id="ht-refresh-btn" style="font-size:11px;padding:3px 10px">↻ Refresh</button>
    </div>
    <div id="ht-body"></div>
    <div id="ht-recent"></div>
  </div>
</main>

<div class="apply-bar" id="apply-bar" style="display:none">
  <div class="info" id="apply-info"></div>
  <div class="apply-bar-right">
    <input type="text" id="pack-name-input" placeholder="pack name" title="Custom RevPack zip filename (without .zip)"
      oninput="this._userEdited=!!this.value">
    <select id="arch-select">
      <option value="arm64-v8a">arm64-v8a</option>
      <option value="armeabi-v7a">armeabi-v7a</option>
      <option value="x86_64">x86_64</option>
      <option value="universal">universal</option>
      <option value="all">all</option>
    </select>
    <label style="font-size:12px;display:flex;align-items:center;gap:4px;color:var(--text2)">
      <input type="checkbox" id="trigger-build-cb" checked> Trigger build
    </label>
    <button class="btn btn-apply" id="apply-btn" onclick="applyConfig()">Apply</button>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<!-- Build Monitor Panel -->
<div class="build-panel" id="build-panel" style="display:none">
  <div class="build-panel-head">
    <h3>Build Monitor</h3>
    <div class="bp-head-btns">
      <button class="bp-minimize" onclick="minimizeBuildPanel()" title="Minimize to Actions History" aria-label="Minimize build panel">─</button>
      <button class="build-panel-close" onclick="closeBuildPanel()" title="Close" aria-label="Close build panel">×</button>
    </div>
  </div>
  <div class="build-panel-body">
    <div class="build-status-row">
      <div class="bp-icon" id="bp-icon">⏳</div>
      <div class="bp-text">
        <div class="bp-label" id="bp-label">Searching for run…</div>
        <div class="bp-sub" id="bp-sub"></div>
      </div>
    </div>
    <div id="bp-links" class="build-links"></div>
    <div class="build-progress"><div class="build-progress-bar" id="bp-bar"></div></div>
    <div class="bp-steps" id="bp-steps" style="display:none">
      <div class="bp-steps-header">
        <span class="bp-steps-title">Steps</span>
      </div>
      <div id="bp-steps-body"></div>
    </div>
  </div>
</div>

<script>
let APPS = [];      
let REPO = '';
let BRANCH = '';
let TOKEN = '';
let PACK_NAME_CONFIG = 'revpack';

(function() {
  const saved = sessionStorage.getItem('revpack_token');
  if (saved) document.querySelector('input[name="token"]').value = saved;
})();

const $ = id => document.getElementById(id);
function showToast(msg, ms = 2800) {
  const t = $('toast'); t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', ms);
}

function parseToml(text) {
  const apps = [];
  const lines = text.split('\n');

  let packApps = [];
  let packExclude = [];
  let packName = 'revpack';

  let current = null;
  let inMain = true;

  for (let line of lines) {
    line = line.replace(/\r/g, '');
    const secM = line.match(/^\[([^\]]+)\]/);
    if (secM) {
      if (current) apps.push(current);
      inMain = false;
      current = {
        name: secM[1],
        enabled: true,
        buildMode: 'apk',
        isDev: false,
        patchesSource: '',
      };
      continue;
    }
    if (inMain) {
      const packM = line.match(/^pack-apps\s*=\s*(.+)/);
      if (packM) {
        packApps = packM[1].split(',').map(s => s.trim().replace(/^"|"$/g, '')).filter(Boolean);
      }
      const exclM = line.match(/^pack-exclude-apps\s*=\s*(.+)/);
      if (exclM) {
        packExclude = exclM[1].split(',').map(s => s.trim().replace(/^"|"$/g, '')).filter(Boolean);
      }
      const nameM = line.match(/^pack-name\s*=\s*"?([^"#\s]+)"?/);
      if (nameM) { packName = nameM[1]; }
      continue;
    }
    if (!current) continue;
    const enM = line.match(/^\s*enabled\s*=\s*(true|false)/);
    if (enM) { current.enabled = enM[1] === 'true'; continue; }
    const bmM = line.match(/^\s*build-mode\s*=\s*"?([^"#\s]+)"?/);
    if (bmM) { current.buildMode = bmM[1]; continue; }
    const psM = line.match(/^\s*patches-source\s*=\s*"([^"]+)"/);
    if (psM) { current.patchesSource = psM[1]; }
    if (/patches-version\s*=\s*"?dev"?/.test(line)) { current.isDev = true; }
  }
  if (current) apps.push(current);

  for (const a of apps) {
    if (a.name.toLowerCase().includes('dev') || a.isDev) a.isDev = true;
  }

  const hasPackList = packApps.length > 0;
  for (const a of apps) {
    if (packExclude.includes(a.name)) {
      a.inPack = false;
    } else if (hasPackList) {
      a.inPack = packApps.includes(a.name);
    } else {
      a.inPack = a.enabled; 
    }
  }

  return { apps, packName };
}

async function loadConfig() {
  REPO   = document.querySelector('input[name="repo"]').value.trim();
  BRANCH = document.querySelector('input[name="branch"]').value.trim() || 'ex';
  const inputToken = document.querySelector('input[name="token"]').value.trim();
  TOKEN  = inputToken || sessionStorage.getItem('revpack_token') || '';
  if (inputToken) sessionStorage.setItem('revpack_token', inputToken);

  if (!REPO) { showToast('Enter a repo (owner/repo)'); return; }

  $('status-banner').innerHTML = '<span class="spinner"></span> Loading config.toml…';
  $('status-banner').style.display = '';
  $('app-area').style.display = 'none';
  $('apply-bar').style.display = 'none';

  async function fetchConfigText() {
    if (!TOKEN) {
      const rawUrl = `https://raw.githubusercontent.com/${REPO}/${encodeURIComponent(BRANCH)}/config.toml`;
      const r = await fetch(rawUrl);
      if (r.ok) return r.text();
      if (r.status === 404) throw new Error('config.toml not found (check repo / branch)');
    }
    const apiUrl = `https://api.github.com/repos/${REPO}/contents/config.toml?ref=${encodeURIComponent(BRANCH)}`;
    const headers = { Accept: 'application/vnd.github.v3.raw', 'X-GitHub-Api-Version': '2022-11-28' };
    if (TOKEN) headers['Authorization'] = `Bearer ${TOKEN}`;
    const r = await fetch(apiUrl, { headers });
    const rem = r.headers.get('X-RateLimit-Remaining');
    const rst = r.headers.get('X-RateLimit-Reset');
    if (rem !== null) _rlRemaining = parseInt(rem, 10);
    if (rst !== null) _rlReset = parseInt(rst, 10);
    if (!r.ok) {
      if ((r.status === 403 || r.status === 429) && _rlRemaining === 0) {
        const secs = _rlReset ? Math.ceil((_rlReset * 1000 - Date.now()) / 1000) : '?';
        throw new Error(`Rate limit exceeded — resets in ${secs}s. Add a GitHub token to increase limits.`);
      }
      throw new Error(`HTTP ${r.status} – ${r.statusText}`);
    }
    return r.text();
  }

  try {
    const text = await fetchConfigText();
    const parsed = parseToml(text);
    APPS = parsed.apps;
    PACK_NAME_CONFIG = parsed.packName;
    renderApps();
  } catch (e) {
    $('status-banner').innerHTML = `❌ Failed to load config: <b>${e.message}</b><br>
      <small>Make sure the repo is public, or provide a token with <code>repo</code> scope.</small>`;
  }
}

function renderApps() {
  const grid    = $('app-grid');
  const devGrid = $('dev-grid');
  grid.innerHTML = ''; devGrid.innerHTML = '';

  const pni = $('pack-name-input');
  if (pni && !pni._userEdited) pni.value = PACK_NAME_CONFIG;

  const normal = APPS.filter(a => !a.isDev);
  const dev    = APPS.filter(a => a.isDev);

  for (const a of normal) grid.appendChild(makeCard(a));
  for (const a of dev)    devGrid.appendChild(makeCard(a));

  $('dev-section-title').style.display = dev.length ? '' : 'none';
  $('app-area').style.display = '';
  $('apply-bar').style.display = '';
  $('status-banner').style.display = 'none';

  updateInfo();
  $('header-sub').textContent = `${APPS.length} apps loaded from ${REPO}`;
  loadRecentRuns();
}

function makeCard(app) {
  const div = document.createElement('div');
  div.className = 'card' + (app.enabled ? '' : ' disabled-card');
  div.id = 'card-' + slug(app.name);

  const devTag = app.isDev
    ? '<span class="tag tag-dev">dev</span>' : '';
  const modTag = app.patchesSource && !app.patchesSource.startsWith('ReVanced/')
    ? `<span class="tag tag-mod" title="${app.patchesSource}">mod</span>` : '';

  const iconHtml = appIconHtml(app.name);

  div.innerHTML = `
    <div class="card-header">
      ${iconHtml}
      <div style="min-width:0">
        <div class="card-name">${app.name}${devTag}${modTag}</div>
        <div class="card-meta">mode: ${app.buildMode}${app.patchesSource ? ' · ' + app.patchesSource.split('/')[0] : ''}</div>
      </div>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Build</span>
      <label class="toggle">
        <input type="checkbox" id="build-${slug(app.name)}" ${app.enabled ? 'checked' : ''}
          aria-label="Build ${app.name}"
          onchange="onBuildToggle('${app.name}', this.checked)">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Pack in RevPack</span>
      <label class="toggle pack-toggle">
        <input type="checkbox" id="pack-${slug(app.name)}" ${app.inPack ? 'checked' : ''}
          aria-label="Pack ${app.name} in RevPack"
          onchange="onPackToggle('${app.name}', this.checked)">
        <span class="slider"></span>
      </label>
    </div>`;
  return div;
}

function slug(name) { return name.replace(/[^a-zA-Z0-9]/g, '-'); }

const AVATAR_COLORS = [
  '#e53935','#d81b60','#8e24aa','#5e35b1','#3949ab',
  '#1e88e5','#039be5','#00897b','#43a047','#fb8c00',

function appIconFallback(img, letter, color) {
  const div = document.createElement('div');
  div.className = 'app-icon-fallback';
  div.style.background = color;
  div.textContent = letter;
  img.parentNode.replaceChild(div, img);
}

function appIconHtml(name) {
  const matched = APP_DOMAINS.find(([re]) => re.test(name));
  const letter = (name.trim()[0] || '?').toUpperCase();
  const color = AVATAR_COLORS[name.charCodeAt(0) % AVATAR_COLORS.length];
  if (!matched) {
    return `<div class="app-icon-fallback" style="background:${color}">${letter}</div>`;
  }
  const domain = matched[1];
  return `<img class="app-icon" src="https://www.google.com/s2/favicons?domain=${domain}&sz=64" alt="" onerror="appIconFallback(this,'${letter}','${color}')">`;
}

function onBuildToggle(name, checked) {
  const app = APPS.find(a => a.name === name);
  if (!app) return;
  app.enabled = checked;
  const card = $('card-' + slug(name));
  if (card) card.className = 'card' + (checked ? '' : ' disabled-card');
  if (!checked) {
    app.inPack = false;
    const pc = $('pack-' + slug(name));
    if (pc) pc.checked = false;
  }
  updateInfo();
}

function onPackToggle(name, checked) {
  const app = APPS.find(a => a.name === name);
  if (!app) return;
  app.inPack = checked;
  if (checked && !app.enabled) {
    app.enabled = true;
    const bc = $('build-' + slug(name));
    if (bc) bc.checked = true;
    const card = $('card-' + slug(name));
    if (card) card.className = 'card';
  }
  updateInfo();
}

function setAll(val, type) {
  for (const app of APPS) {
    if (type === 'build') {
      app.enabled = val;
      const bc = $('build-' + slug(app.name));
      if (bc) bc.checked = val;
      const card = $('card-' + slug(app.name));
      if (card) card.className = 'card' + (val ? '' : ' disabled-card');
      if (!val) {
        app.inPack = false;
        const pc = $('pack-' + slug(app.name));
        if (pc) pc.checked = false;
      }
    } else {
      const newVal = val && app.enabled;
      app.inPack = newVal;
      const pc = $('pack-' + slug(app.name));
      if (pc) pc.checked = newVal;
    }
  }
  updateInfo();
}

function updateInfo() {
  const enabledCount = APPS.filter(a => a.enabled).length;
  const packCount    = APPS.filter(a => a.inPack).length;
  $('apply-info').innerHTML =
    `Build: <b>${enabledCount}</b> apps &nbsp;|&nbsp; RevPack: <b>${packCount}</b> apps`;
}

async function applyConfig() {
  const inputToken = document.querySelector('input[name="token"]').value.trim();
  TOKEN = inputToken || localStorage.getItem('revpack_token') || '';
  if (!TOKEN) {
    showToast('⚠️ A GitHub token is required to trigger workflows', 4000);
    return;
  }
  sessionStorage.setItem('revpack_token', TOKEN);
  if (!inputToken) document.querySelector('input[name="token"]').value = TOKEN;

  const btn = $('apply-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Applying…';

  const enabledApps  = APPS.filter(a =>  a.enabled).map(a => a.name);
  const disabledApps = APPS.filter(a => !a.enabled).map(a => a.name);
  const packApps     = APPS.filter(a =>  a.inPack).map(a => a.name);
  const packExclude  = APPS.filter(a =>  a.enabled && !a.inPack).map(a => a.name);

  const arch   = $('arch-select').value;
  const triggerBuild = $('trigger-build-cb').checked;
  const packNameVal = ($('pack-name-input').value.trim()) || PACK_NAME_CONFIG;

  const inputs = {
    enabled_apps:       enabledApps.join(',') || 'all',
    disabled_apps:      disabledApps.join(','),
    pack_apps:          packApps.join(','),
    pack_exclude_apps:  packExclude.join(','),
    pack_name: packNameVal,
    trigger_build:      String(triggerBuild),
    build_arch:         arch,
  };

  try {
    const resp = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/configure-apps.yml/dispatches`,
      {
        method: 'POST',
        headers: {
          Authorization:  `Bearer ${TOKEN}`,
          Accept:         'application/vnd.github+json',
          'Content-Type': 'application/json',
          'X-GitHub-Api-Version': '2022-11-28',
        },
        body: JSON.stringify({ ref: BRANCH, inputs }),
      }
    );

    if (resp.status === 204) {
      showToast(`✅ Workflow triggered! ${triggerBuild ? 'Build starting…' : 'Config saved.'}`, 4000);
      if (triggerBuild) startBuildMonitor(Date.now());
    } else if (resp.status === 403) {
      throw new Error('Token lacks permission — add the "workflow" scope (classic PAT) or "Actions: Read and write" (fine-grained PAT).');
    } else if (resp.status === 401) {
      throw new Error('Token invalid or expired. Re-generate your PAT and try again.');
    } else if (resp.status === 404) {
      throw new Error(`Workflow not found. Check that "configure-apps.yml" exists on branch "${BRANCH}" and the repo name is correct.`);
    } else {
      const body = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${body}`);
    }
  } catch (e) {
    showToast(`❌ ${e.message}`, 7000);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Apply';
  }
}

let _monitorTimer = null;
let BUILD_HISTORY = [];
let _currentHistoryId = null;
let RECENT_RUNS = [];
const STORAGE_KEY = 'revpack_build_state';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      history: BUILD_HISTORY,
      currentId: _currentHistoryId,
      repo: REPO,
      branch: BRANCH
    }));
  } catch (_) {}
}

function initState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!Array.isArray(data.history) || data.history.length === 0) return;
    BUILD_HISTORY = data.history;
    _currentHistoryId = data.currentId || null;
    if (data.repo)   REPO   = data.repo;
    if (data.branch) BRANCH = data.branch;
  } catch (_) { return; }

  updateHistoryTab();
  loadRecentRuns();

  const entry = _currentHistoryId ? BUILD_HISTORY.find(e => e.id === _currentHistoryId) : null;
  if (!entry) return;

  if (!entry.minimized) showBuildPanel(entry.state, entry.run, entry.assets);

  if (entry.state === 'searching') {
    entry.state = 'not-found';
    saveState();
    if (!entry.minimized) showBuildPanel('not-found', null, null);
    else updateHistoryTab();
  } else if ((entry.state === 'queued' || entry.state === 'in_progress') && entry.run) {
    _monitorTimer = setTimeout(() => pollRunStatus(entry.run.id), 5000);
  }
}

function closeBuildPanel() {
  clearTimeout(_monitorTimer);
  $('build-panel').style.display = 'none';
  _currentHistoryId = null;
  saveState();
}

function minimizeBuildPanel() {
  const entry = BUILD_HISTORY.find(e => e.id === _currentHistoryId);
  if (entry) entry.minimized = true;
  $('build-panel').style.display = 'none';
  updateHistoryTab();
  saveState();
}

function restoreBuildFromHistory(id) {
  const entry = BUILD_HISTORY.find(e => e.id === id);
  if (!entry) return;
  _currentHistoryId = id;
  entry.minimized = false;
  showBuildPanel(entry.state, entry.run, entry.assets);
  updateHistoryTab();
  saveState();
}

function generateId() {
  return Math.random().toString(36).slice(2, 10);
}

function updateHistoryTab() {
  const body = $('ht-body');
  const section = $('history-section');
  const entries = BUILD_HISTORY.filter(e => e.minimized);
  const hasAny = entries.length > 0 || RECENT_RUNS.length > 0;
  section.style.display = hasAny ? '' : 'none';
  const icons = { searching:'🔍', queued:'⏳', in_progress:'🔄', success:'✅', failure:'❌', cancelled:'⚠️', 'not-found':'❓' };
  const labels = { searching:'Searching…', queued:'Queued', in_progress:'In progress…', success:'Succeeded', failure:'Failed', cancelled:'Cancelled', 'not-found':'Not found' };
  body.innerHTML = '';
  for (const e of entries) {
    const sub = e.run
      ? `Run #${e.run.run_number} · ${new Date(e.run.created_at).toLocaleTimeString()}`
      : `Started ${new Date(e.triggeredAt).toLocaleTimeString()}`;
    const div = document.createElement('div');
    div.className = 'ht-entry';
    div.id = 'ht-entry-' + e.id;
    div.innerHTML = `<span class="ht-icon">${icons[e.state]||'⏳'}</span><div class="ht-info"><div class="ht-label">${labels[e.state]||e.state}</div><div class="ht-sub">${sub}</div></div><button class="ht-btn" onclick="restoreBuildFromHistory('${e.id}')">Restore</button>`;
    body.appendChild(div);
  }
  renderRecentRuns();
}

function renderRecentRuns() {
  const el = $('ht-recent');
  if (!el) return;
  if (RECENT_RUNS.length === 0) { el.innerHTML = ''; return; }
  const stateOf = r => r.status === 'completed' ? r.conclusion : r.status;
  const icons = { queued:'⏳', in_progress:'🔄', success:'✅', failure:'❌', cancelled:'⚠️', timed_out:'⏱️', skipped:'⏭️' };
  const labels = { queued:'Queued', in_progress:'In progress', success:'Succeeded', failure:'Failed', cancelled:'Cancelled', timed_out:'Timed out', skipped:'Skipped' };
  el.innerHTML = '<div style="font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px">Recent runs</div>';
  for (const r of RECENT_RUNS) {
    const s = stateOf(r);
    const icon = icons[s] || '⏳';
    const label = labels[s] || s;
    const date = new Date(r.created_at).toLocaleString();
    const div = document.createElement('div');
    div.className = 'ht-entry';
    div.style.flexWrap = 'wrap';
    div.innerHTML = `<span class="ht-icon">${icon}</span><div class="ht-info"><div class="ht-label">Run #${r.run_number} — ${label}</div><div class="ht-sub">${date} · ${r.head_commit?.message?.split('\n')[0] || ''}</div></div><button class="ht-btn" onclick="toggleRunSteps(this,'${r.id}')">Steps</button><div class="ht-steps" id="ht-steps-${r.id}" style="display:none;width:100%;margin-top:8px;font-size:11px;padding-left:4px"><span style="color:var(--text2)">Loading…</span></div>`;
    el.appendChild(div);
  }
}

function updateHistoryEntry(id, state, run, assets) {
  const e = BUILD_HISTORY.find(e => e.id === id);
  if (!e) return;
  e.state = state; e.run = run; e.assets = assets;
  if (e.minimized) updateHistoryTab();
  saveState();
}

function showBuildPanel(state, run, assets) {
  const entry = BUILD_HISTORY.find(e => e.id === _currentHistoryId);
  if (entry && entry.minimized) {
    updateHistoryEntry(_currentHistoryId, state, run, assets);
    return;
  }
  const panel = $('build-panel');
  panel.style.display = '';
  panel.className = 'build-panel bp-' + state.replace('_', '-');

  const icons = {
    searching:   '🔍',
    queued:      '⏳',
    in_progress: '🔄',
    success:     '✅',
    failure:     '❌',
    cancelled:   '⚠️',
    'not-found': '❓',
  };
  const labels = {
    searching:   'Searching for run…',
    queued:      'Queued — waiting to start',
    in_progress: 'Build in progress…',
    success:     'Build succeeded!',
    failure:     'Build failed',
    cancelled:   'Build was cancelled',
    'not-found': 'Run not found',
  };

  $('bp-icon').textContent = icons[state] || '⏳';
  $('bp-label').textContent = labels[state] || state;
  $('bp-sub').textContent = run
    ? `Run #${run.run_number} · ${new Date(run.created_at).toLocaleTimeString()}`
    : '';

  const linksEl = $('bp-links');
  linksEl.innerHTML = '';

  if (state === 'success') {
    if (assets && assets.length > 0) {
      for (const asset of assets) {
        const sz = asset.size >= 1048576
          ? `${(asset.size / 1048576).toFixed(1)} MB`
          : `${(asset.size / 1024).toFixed(0)} KB`;
        const a = document.createElement('a');
        a.className = 'build-link';
        a.href = asset.browser_download_url;
        a.target = '_blank'; a.rel = 'noopener';
        a.innerHTML = `<span class="lk-name">⬇ ${asset.name}</span><span class="lk-size">${sz}</span>`;
        linksEl.appendChild(a);
      }
    } else {
      const a = document.createElement('a');
      a.className = 'build-link';
      a.href = `https://github.com/${REPO}/releases/tag/latest-build`;
      a.target = '_blank'; a.rel = 'noopener';
      a.innerHTML = '<span class="lk-name">🔗 View latest-build release</span>';
      linksEl.appendChild(a);
    }
  } else if ((state === 'failure' || state === 'cancelled') && run) {
    const a = document.createElement('a');
    a.className = 'build-link';
    a.href = run.html_url;
    a.target = '_blank'; a.rel = 'noopener';
    a.innerHTML = '<span class="lk-name">🔍 View run logs on GitHub</span>';
    linksEl.appendChild(a);
  } else if (state === 'not-found') {
    const a = document.createElement('a');
    a.className = 'build-link';
    a.href = `https://github.com/${REPO}/actions`;
    a.target = '_blank'; a.rel = 'noopener';
    a.innerHTML = '<span class="lk-name">🔗 Open Actions page</span>';
    linksEl.appendChild(a);
  }
  if (_currentHistoryId) updateHistoryEntry(_currentHistoryId, state, run, assets);

  if (run) fetchAndShowSteps(run.id);
  else { const s = $('bp-steps'); if (s) s.style.display = 'none'; }
}

const _stepsCache = {};

async function fetchAndShowSteps(runId) {
  const now = Date.now();
  const cached = _stepsCache[runId];
  if (cached && (cached.completed || now - cached.fetchedAt < 30000)) {
    _renderStepsData(cached.data);
    return;
  }
  try {
    const data = await apiGet(`https://api.github.com/repos/${REPO}/actions/runs/${runId}/jobs?per_page=10`);
    const allDone = (data.jobs || []).length > 0 && (data.jobs || []).every(j => j.status === 'completed');
    _stepsCache[runId] = { data, fetchedAt: now, completed: allDone };
    _renderStepsData(data);
  } catch (_) {}
}

function _renderStepsData(data) {
  const jobs = (data.jobs || []).filter(j => j.status !== 'queued' || (j.steps && j.steps.length > 0));
  if (!jobs.length) return;
  const iconOf = s => {
    if (s.status === 'in_progress') return '<i class="bp-step-icon" style="color:var(--blue)">▶</i>';
    if (s.conclusion === 'success')  return '<i class="bp-step-icon" style="color:var(--green)">✓</i>';
    if (s.conclusion === 'failure')  return '<i class="bp-step-icon" style="color:var(--red)">✗</i>';
    if (s.conclusion === 'skipped')  return '<i class="bp-step-icon" style="color:var(--text2)">—</i>';
    return '<i class="bp-step-icon">○</i>';
  };
  const classOf = s => {
    if (s.status === 'in_progress') return 'step-active';
    if (s.conclusion === 'failure') return 'step-fail';
    return '';
  };
  let html = '';
  for (const job of jobs) {
    const jIcon = job.status === 'in_progress' ? '🔄'
      : job.conclusion === 'success' ? '✅'
      : job.conclusion === 'failure' ? '❌'
      : '⏳';
    html += `<div class="bp-job-name">${jIcon} ${job.name}</div>`;
    for (const step of (job.steps || [])) {
      const dur = step.completed_at && step.started_at
        ? `${Math.round((new Date(step.completed_at) - new Date(step.started_at)) / 1000)}s` : '';
      html += `<div class="bp-step ${classOf(step)}">${iconOf(step)}<span class="bp-step-name">${step.name}</span>${dur ? `<span class="bp-step-dur">${dur}</span>` : ''}</div>`;
    }
  }
  const body = $('bp-steps-body');
  const section = $('bp-steps');
  if (body) body.innerHTML = html;
  if (section) section.style.display = '';
}

async function toggleRunSteps(btn, runId) {
  const el = $('ht-steps-' + runId);
  if (!el) return;
  if (el.style.display !== 'none') {
    el.style.display = 'none';
    btn.textContent = 'Steps';
    return;
  }
  el.style.display = '';
  btn.textContent = 'Hide';
  try {
    const data = await apiGet(`https://api.github.com/repos/${REPO}/actions/runs/${runId}/jobs?per_page=10`);
    const jobs = data.jobs || [];
    const iconOf = s => {
      if (s.status === 'in_progress') return '<span style="color:var(--blue)">▶</span>';
      if (s.conclusion === 'success')  return '<span style="color:var(--green)">✓</span>';
      if (s.conclusion === 'failure')  return '<span style="color:var(--red)">✗</span>';
      if (s.conclusion === 'skipped')  return '<span style="color:var(--text2)">—</span>';
      return '<span>○</span>';
    };
    let html = '';
    for (const job of jobs) {
      html += `<div style="font-weight:700;margin:6px 0 3px">${job.name}</div>`;
      for (const step of (job.steps || [])) {
        const dur = step.completed_at && step.started_at
          ? ` <span style="color:var(--text2);font-size:10px">${Math.round((new Date(step.completed_at) - new Date(step.started_at))/1000)}s</span>` : '';
        const col = step.status === 'in_progress' ? 'var(--blue)' : step.conclusion === 'failure' ? 'var(--red)' : 'var(--text2)';
        html += `<div style="display:flex;gap:6px;padding:2px 0 2px 8px;color:${col}">${iconOf(step)}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${step.name}</span>${dur}</div>`;
      }
    }
    el.innerHTML = html || '<span style="color:var(--text2)">No steps found.</span>';
  } catch (e) {
    el.innerHTML = `<span style="color:var(--red)">Failed to load steps.</span>`;
  }
}

async function loadRecentRuns() {
  if (!REPO) return;
  const btn = $('ht-refresh-btn');
  if (btn) btn.disabled = true;
  try {
    const data = await apiGet(
      `https://api.github.com/repos/${REPO}/actions/workflows/ci.yml/runs?per_page=10&branch=${encodeURIComponent(BRANCH)}`
    );
    RECENT_RUNS = data.workflow_runs || [];
    $('history-section').style.display = RECENT_RUNS.length > 0 ? '' : ($('history-section').style.display);
    renderRecentRuns();
    if (RECENT_RUNS.length > 0) $('history-section').style.display = '';
  } catch (_) {}
  if (btn) btn.disabled = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let _rlRemaining = null;
let _rlReset = null;

async function apiGet(url) {
  if (_rlRemaining === 0 && _rlReset && Date.now() < _rlReset * 1000) {
    const secs = Math.ceil((_rlReset * 1000 - Date.now()) / 1000);
    throw new Error(`Rate limit exceeded — resets in ${secs}s. Add a GitHub token to increase limits.`);
  }
  const headers = { Accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
  if (TOKEN) headers['Authorization'] = `Bearer ${TOKEN}`;
  const resp = await fetch(url, { headers });
  const rem = resp.headers.get('X-RateLimit-Remaining');
  const rst = resp.headers.get('X-RateLimit-Reset');
  if (rem !== null) _rlRemaining = parseInt(rem, 10);
  if (rst !== null) _rlReset = parseInt(rst, 10);
  if (!resp.ok) {
    if ((resp.status === 403 || resp.status === 429) && _rlRemaining === 0) {
      const secs = _rlReset ? Math.ceil((_rlReset * 1000 - Date.now()) / 1000) : '?';
      throw new Error(`Rate limit exceeded — resets in ${secs}s. Add a GitHub token to increase limits.`);
    }
    throw new Error(`HTTP ${resp.status}`);
  }
  return resp.json();
}

async function startBuildMonitor(triggeredAt) {
  const id = generateId();
  BUILD_HISTORY.push({ id, triggeredAt, state: 'searching', run: null, assets: null, minimized: false });
  _currentHistoryId = id;
  saveState();
  showBuildPanel('searching', null, null);
  await sleep(12000);
  pollForRun(triggeredAt, 0);
}

async function pollForRun(triggeredAt, attempts) {
  if (attempts >= 20) {
    showBuildPanel('not-found', null, null);
    return;
  }
  try {
    const data = await apiGet(
      `https://api.github.com/repos/${REPO}/actions/workflows/ci.yml/runs?per_page=5&branch=${encodeURIComponent(BRANCH)}`
    );
    const run = (data.workflow_runs || []).find(
      r => new Date(r.created_at).getTime() >= triggeredAt - 60000
    );
    if (run) {
      if (run.status === 'completed') {
        await handleRunComplete(run);
      } else {
        showBuildPanel(run.status, run, null);
        _monitorTimer = setTimeout(() => pollRunStatus(run.id), 15000);
      }
    } else {
      _monitorTimer = setTimeout(() => pollForRun(triggeredAt, attempts + 1), 15000);
    }
  } catch (_) {
    _monitorTimer = setTimeout(() => pollForRun(triggeredAt, attempts + 1), 20000);
  }
}

async function pollRunStatus(runId) {
  try {
    const run = await apiGet(`https://api.github.com/repos/${REPO}/actions/runs/${runId}`);
    if (run.status === 'completed') {
      await handleRunComplete(run);
    } else {
      showBuildPanel(run.status, run, null);
      _monitorTimer = setTimeout(() => pollRunStatus(runId), 15000);
    }
  } catch (_) {
    _monitorTimer = setTimeout(() => pollRunStatus(runId), 20000);
  }
}

async function handleRunComplete(run) {
  if (run.conclusion === 'success') {
    try {
      const release = await apiGet(
        `https://api.github.com/repos/${REPO}/releases/tags/latest-build`
      );
      showBuildPanel('success', run, release.assets || []);
    } catch (_) {
      showBuildPanel('success', run, []);
    }
  } else {
    showBuildPanel(run.conclusion === 'cancelled' ? 'cancelled' : 'failure', run, null);
  }
}

initState();
</script>
